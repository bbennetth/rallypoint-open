# planner-api as a Cloudflare Worker (#313, Phase 5). `wrangler deploy --env qa`
# -> planner.rallypt.dev, `--env prod` -> planner.rallypt.app. Entry is
# src/worker.ts (`{ fetch }` only); the Node server.ts is retired.
#
# planner is a pure BFF: it proxies lists/events/RPID over HTTP and owns
# only the sessions store. So this Worker is fetch-only — NO Durable Object
# (no realtime), NO [triggers] (no cron), NO R2 (no object store).
#
# Account + auth come from CI/the deployer (CLOUDFLARE_API_TOKEN +
# CLOUDFLARE_ACCOUNT_ID); D1 databases are auto-provisioned/name-linked by
# wrangler >=4.45 (bootstrap step creates rp-planner-{qa,prod} if absent).
# Real secrets via `wrangler secret bulk --env <env>` (cf-deploy.yml push-secrets step):
#   PLANNER_API_KEY
#   PLANNER_SESSION_KEY_V1

name = "rallypoint-planner"
main = "src/worker.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

# Serve the planner-web SPA from the assets dir; run the Worker first only
# for the API, so /api/* hits the Worker while the SPA serves first-party
# from the same origin (the __Host- cookie config). The deploy build
# populates ./public from `npm run build -w @rallypoint/planner-web`; a
# committed placeholder keeps `wrangler dev` working pre-build.
[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

# planner has no realtime (no Durable Object), no object store (no R2), and
# no background pruner (no cron) — so there is NO [[migrations]],
# [[durable_objects.bindings]], [triggers], or [[r2_buckets]] block.

# Local-dev / top-level config (used by `wrangler dev`). parseEnv fills
# dev-safe defaults for the secrets and the BFF target URLs.
[vars]
NODE_ENV = "development"
PLANNER_UI_ORIGIN = "http://localhost:5177"
RPID_API_URL = "http://localhost:8080"
LISTS_API_URL = "http://localhost:8082"
EVENTS_API_URL = "http://localhost:8081"

[[d1_databases]]
binding = "DB"
database_name = "rp-planner-local"
# Ignored by `wrangler dev --local` (local SQLite store); a real id is only
# needed for the per-env deploy blocks below.
database_id = "local-dev-unused"
migrations_dir = "../../packages/planner-db/migrations"

# ---- QA: planner.rallypt.dev ----------------------------------------
# vars must be redeclared per env — wrangler does NOT inherit top-level
# [vars] into named envs, so omitting one here would let the zod default
# silently fall back to localhost (no "vars not inherited" warning only
# because every consumed var is restated).
[env.qa]
vars = { NODE_ENV = "production", PLANNER_UI_ORIGIN = "https://planner.rallypt.dev", RPID_API_URL = "https://id.rallypt.dev", LISTS_API_URL = "https://lists.rallypt.dev", EVENTS_API_URL = "https://events.rallypt.dev" }

[[env.qa.d1_databases]]
binding = "DB"
database_name = "rp-planner-qa"
# database_id injected by cf-deploy.yml at deploy time — do NOT add manually
# (name-linking fails `d1 migrations apply --remote`; bootstrap: `wrangler d1 create rp-planner-qa || true`).
migrations_dir = "../../packages/planner-db/migrations"

# Service bindings: same-account cross-Worker calls to id/lists/events
# dispatch in-process via these bindings (the CF edge drops same-account
# loopback fetches to public hostnames). Path-matched against the bound
# Worker, so the existing ${*_API_URL}/api/v1/... URLs work unchanged. No
# top-level [[services]] block — local `wrangler dev` falls back to the
# public-fetch path so single-app dev keeps working.
[[env.qa.services]]
binding = "RPID"
service = "rallypoint-id-qa"

[[env.qa.services]]
binding = "LISTS"
service = "rallypoint-lists-qa"

[[env.qa.services]]
binding = "EVENTS"
service = "rallypoint-events-qa"

[[env.qa.routes]]
pattern = "planner.rallypt.dev"
custom_domain = true

# ---- Prod: planner.rallypt.app --------------------------------------
[env.prod]
vars = { NODE_ENV = "production", PLANNER_UI_ORIGIN = "https://planner.rallypt.app", RPID_API_URL = "https://id.rallypt.app", LISTS_API_URL = "https://lists.rallypt.app", EVENTS_API_URL = "https://events.rallypt.app" }

[[env.prod.d1_databases]]
binding = "DB"
database_name = "rp-planner-prod"
# database_id injected by cf-deploy.yml at deploy time — do NOT add manually
# (name-linking fails `d1 migrations apply --remote`; bootstrap: `wrangler d1 create rp-planner-prod || true`).
migrations_dir = "../../packages/planner-db/migrations"

[[env.prod.services]]
binding = "RPID"
service = "rallypoint-id-prod"

[[env.prod.services]]
binding = "LISTS"
service = "rallypoint-lists-prod"

[[env.prod.services]]
binding = "EVENTS"
service = "rallypoint-events-prod"

[[env.prod.routes]]
pattern = "planner.rallypt.app"
custom_domain = true
